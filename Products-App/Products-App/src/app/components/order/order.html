<!-- select -->
 <h1>Order amount is : {{totalOrderPrice}}</h1>
<div class="m-5">
<div class="mb-3 w-50 m-auto">
  <label for="" class="form-label">Categories</label>
  <select class="form-select form-select-lg" [(ngModel)]="selectedCatId">
    <option value="0" selected>All</option>
    @for (cat of categories; track cat.id) {
      <option [value]="cat.id">{{ cat.name }}</option>
    }
  </select>
</div>


<h1>----------------------- Child Start ---------------------</h1>
<app-products [sentSelectedCatId]="selectedCatId" (onTotalOrderPriceChanged)="setTotalOrderPrice($event)"></app-products>
<h1>----------------------- Child End ---------------------</h1>

</div>
